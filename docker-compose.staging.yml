# Staging environment — isolated from production on the same droplet
# Ports 3020-3024, separate DB/Redis/volumes/network

name: timetrack-staging

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: timetrack-postgres-staging
    restart: unless-stopped
    env_file: docker.staging.env
    environment:
      POSTGRES_DB: timetrack_db
      POSTGRES_USER: timetrack_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./packages/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - timetrack-staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetrack_user -d timetrack_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Service
  api:
    build:
      context: .
      dockerfile: ./packages/api/Dockerfile
      target: production
    container_name: timetrack-api-staging
    restart: unless-stopped
    env_file: docker.staging.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://timetrack_user:${POSTGRES_PASSWORD}@postgres:5432/timetrack_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: ${API_PORT:-3021}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      LOG_LEVEL: info
      APPLICATION_URL: ${APPLICATION_URL:-https://app.staging.track.alfredo.re}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - timetrack-staging-network
    volumes:
      - staging_api_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-3021}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${API_PORT:-3021}:${API_PORT:-3021}"

  # Web UI Service (includes nginx for serving React app and proxying API)
  web:
    build:
      context: .
      dockerfile: ./packages/ui/Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: timetrack-web-staging
    restart: unless-stopped
    env_file: docker.staging.env
    ports:
      - "${WEB_PORT:-3020}:80"
    depends_on:
      - api
    networks:
      - timetrack-staging-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: timetrack-redis-staging
    restart: unless-stopped
    env_file: docker.staging.env
    networks:
      - timetrack-staging-network
    volumes:
      - staging_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secure_password}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Marketing Landing Service (static nginx)
  landing:
    build:
      context: .
      dockerfile: ./packages/landing/Dockerfile
      target: production
      args:
        PUBLIC_URL: "/"
    container_name: timetrack-landing-staging
    restart: unless-stopped
    environment:
      PUBLIC_URL: "/"
    ports:
      - "${LANDING_PORT:-3024}:80"
    depends_on:
      - api
    networks:
      - timetrack-staging-network

networks:
  timetrack-staging-network:
    driver: bridge

volumes:
  staging_postgres_data:
    driver: local
  staging_redis_data:
    driver: local
  staging_api_logs:
    driver: local
